<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>무양공원 주차밀도 조사 v11</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
:root{--blue:#1a56db;--blue-lt:#eff6ff;--blue-bd:#93c5fd;--red:#dc2626;--red-lt:#fef2f2;--red-bd:#fca5a5;--green:#059669;--green-lt:#d1fae5;--green-bd:#6ee7b7;--amber:#d97706;--amber-lt:#fef3c7;--amber-bd:#fcd34d;--purple:#7c3aed;--purple-lt:#ede9fe;--purple-bd:#c4b5fd;--gray0:#f9fafb;--gray1:#f3f4f6;--gray2:#e5e7eb;--gray5:#6b7280;--gray7:#374151;--gray9:#111827;--r:12px;--rs:8px;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;font-family:-apple-system,'Apple SD Gothic Neo',sans-serif;color:var(--gray9);font-size:15px;}
#app{display:flex;flex-direction:column;height:100dvh;max-width:520px;margin:0 auto;background:#fff;overflow:hidden;}
#header{background:var(--blue);color:#fff;padding:8px 12px;flex-shrink:0;display:flex;align-items:center;gap:8px;}
#header h1{font-size:14px;font-weight:700;flex:1;}
.hbtn{background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.35);color:#fff;border-radius:7px;padding:5px 10px;font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap;}
#gps-badge{font-size:10px;padding:3px 8px;border-radius:20px;background:#1e3a5f;color:#60a5fa;border:1px solid #1d4ed8;white-space:nowrap;flex-shrink:0;}
#gps-badge.ok{background:#14532d;color:#4ade80;border-color:#16a34a;}
#gps-badge.calib{background:#713f12;color:#fcd34d;border-color:#d97706;}
#map{flex:1;min-height:0;position:relative;}
#status{flex-shrink:0;padding:5px 12px;font-size:11px;font-weight:600;color:var(--gray7);background:var(--gray0);border-top:1px solid var(--gray2);min-height:26px;display:flex;align-items:center;gap:6px;}
#sdot{width:7px;height:7px;border-radius:50%;background:var(--gray5);flex-shrink:0;transition:background .3s;}
#sdot.draw{background:var(--purple);animation:blink .6s infinite;}
#sdot.ok{background:var(--green);}
#sdot.calib{background:var(--amber);animation:blink .7s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
#toolbar{flex-shrink:0;background:#fff;border-top:2px solid var(--gray2);padding:7px 8px;display:flex;gap:5px;}
.tb{flex:1;padding:10px 4px;font-size:11px;font-weight:700;border-radius:var(--rs);border:2px solid transparent;cursor:pointer;white-space:nowrap;transition:all .15s;text-align:center;}
.tb:active{transform:scale(.95);}
.tb-draw{background:var(--blue-lt);color:var(--blue);border-color:var(--blue-bd);}
.tb-draw.on{background:var(--purple-lt);color:var(--purple);border-color:var(--purple-bd);animation:pulse .8s infinite;}
.tb-calib{background:var(--amber-lt);color:#92400e;border-color:var(--amber-bd);}
.tb-calib.done{background:var(--green-lt);color:#065f46;border-color:var(--green-bd);}
.tb-list{background:var(--gray1);color:var(--gray7);border-color:var(--gray2);}
.tb-analyze{background:#fdf4ff;color:#6b21a8;border-color:#d8b4fe;}
.tb-save{background:var(--green);color:#fff;border-color:var(--green);}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
.pop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:3000;align-items:flex-end;justify-content:center;}
.pop.open{display:flex;}
.pbox{background:#fff;border-radius:20px 20px 0 0;padding:16px 16px 36px;width:100%;max-width:520px;max-height:92vh;overflow-y:auto;}
.phandle{width:36px;height:4px;border-radius:2px;background:var(--gray2);margin:0 auto 14px;}
.ptitle{font-size:15px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;}
.psec{font-size:10px;font-weight:700;color:var(--gray5);letter-spacing:.06em;text-transform:uppercase;margin:14px 0 7px;}
.pf label{display:block;font-size:12px;font-weight:600;color:var(--gray7);margin-bottom:4px;}
.pf input,.pf select{width:100%;padding:10px 12px;font-size:14px;border:1.5px solid var(--gray2);border-radius:var(--rs);background:#fff;-webkit-appearance:none;}
.pf input:focus{outline:none;border-color:var(--blue);}
.tgrid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:4px;}
.tbtn{padding:11px 8px;border-radius:var(--rs);border:2px solid;cursor:pointer;text-align:center;font-size:12px;font-weight:700;line-height:1.4;transition:all .12s;}
.tbtn:active{transform:scale(.96);}
.tbtn.sel{border-width:3px;}
.t-w{border-color:#9ca3af;color:#374151;background:#f9fafb;}.t-w.sel{background:#e5e7eb;}
.t-y1{border-color:#ca8a04;color:#92400e;background:#fefce8;}.t-y1.sel{background:#fef08a;}
.t-y2{border-color:#b45309;color:#7c2d12;background:#fef3c7;}.t-y2.sel{background:#fde68a;}
.t-ob{border-color:#dc2626;color:#7f1d1d;background:#fef2f2;}.t-ob.sel{background:#fecaca;}
.ft-box{background:var(--red-lt);border:1.5px solid var(--red-bd);border-radius:var(--rs);padding:9px 12px;font-size:12px;font-weight:700;color:#991b1b;margin-bottom:10px;display:none;}
.ft-box.show{display:block;}
/* 카운터 바 */
.cnt-bar{display:grid;grid-template-columns:1fr 1fr 1fr;border-radius:var(--rs);overflow:hidden;border:1.5px solid var(--gray2);height:58px;margin-bottom:7px;}
.cnt-minus{background:var(--red-lt);border:none;font-size:34px;font-weight:300;color:var(--red);cursor:pointer;line-height:1;transition:background .1s;}
.cnt-minus:active{background:#fecaca;}
.cnt-mid{background:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;border-left:1.5px solid var(--gray2);border-right:1.5px solid var(--gray2);gap:1px;position:relative;}
.cnt-lbl{font-size:10px;color:var(--gray5);font-weight:600;}
.cnt-val{font-size:24px;font-weight:700;color:var(--gray9);line-height:1;}
.cnt-plus{background:var(--blue-lt);border:none;font-size:34px;font-weight:300;color:var(--blue);cursor:pointer;line-height:1;transition:background .1s;}
.cnt-plus:active{background:#bfdbfe;}
.cnt-x{position:absolute;top:3px;right:3px;width:16px;height:16px;border-radius:50%;background:var(--red-lt);border:1px solid var(--red-bd);color:var(--red);font-size:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.cnt-add{width:100%;padding:12px;border-radius:var(--rs);border:2px dashed var(--gray2);background:transparent;font-size:12px;font-weight:600;color:var(--gray5);cursor:pointer;margin-bottom:4px;}
.cnt-add:active{background:var(--gray1);}
/* 사진 */
.photo-card{border:1.5px solid var(--gray2);border-radius:var(--r);overflow:hidden;margin-bottom:8px;}
.photo-card-top{display:flex;gap:10px;padding:10px;}
.photo-thumb{width:64px;height:64px;flex-shrink:0;border-radius:var(--rs);background:var(--gray1);display:flex;align-items:center;justify-content:center;font-size:26px;border:1px solid var(--gray2);overflow:hidden;}
.photo-thumb img{width:100%;height:100%;object-fit:cover;}
.photo-info{flex:1;min-width:0;}
.photo-name{font-size:12px;font-weight:700;color:var(--gray9);margin-bottom:3px;}
.photo-badge{display:inline-flex;align-items:center;font-size:10px;padding:2px 7px;border-radius:12px;font-weight:600;margin-bottom:4px;}
.badge-gps{background:var(--amber-lt);color:#92400e;border:1px solid var(--amber-bd);}
.badge-ok{background:var(--green-lt);color:#065f46;border:1px solid var(--green-bd);}
.photo-coord{font-size:10px;color:var(--gray5);}
.photo-del{align-self:flex-start;width:28px;height:28px;border-radius:50%;border:1px solid var(--red-bd);background:var(--red-lt);color:var(--red);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.photo-footer{border-top:1px solid var(--gray2);padding:8px 10px;display:flex;align-items:center;justify-content:space-between;}
.photo-footer.warn{background:var(--amber-lt);}
.photo-footer.ok{background:var(--green-lt);}
.photo-hint{font-size:11px;}
.photo-hint.warn{color:#92400e;}.photo-hint.ok{color:#065f46;}
.photo-calib-btn{padding:5px 11px;border-radius:6px;border:1px solid;font-size:11px;font-weight:600;cursor:pointer;background:#fff;}
.photo-calib-btn.warn{border-color:var(--amber-bd);color:#92400e;}
.photo-calib-btn.ok{border-color:var(--green-bd);color:#065f46;}
#calib-banner{display:none;position:absolute;top:10px;left:50%;transform:translateX(-50%);z-index:1000;background:#1d4ed8;color:#fff;border-radius:20px;padding:8px 18px;font-size:12px;font-weight:700;white-space:nowrap;box-shadow:0 2px 12px rgba(0,0,0,.3);cursor:pointer;}
#calib-banner.show{display:block;}
.pbtns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:14px;}
.pb-c{padding:13px;background:var(--gray1);color:var(--gray7);border:none;border-radius:var(--rs);font-size:13px;font-weight:600;cursor:pointer;}
.pb-s{padding:13px;background:var(--blue);color:#fff;border:none;border-radius:var(--rs);font-size:13px;font-weight:700;cursor:pointer;}
.pb-del{padding:7px 12px;background:var(--red-lt);color:var(--red);border:1.5px solid var(--red-bd);border-radius:var(--rs);font-size:12px;font-weight:600;cursor:pointer;}
#list-panel{display:none;position:fixed;inset:0;background:#fff;z-index:2000;overflow-y:auto;}
#list-panel.open{display:block;}
.lph{position:sticky;top:0;background:#fff;border-bottom:1px solid var(--gray2);padding:10px 14px;display:flex;align-items:center;gap:10px;z-index:10;}
.lph h2{font-size:15px;font-weight:700;flex:1;}
.lcard{border:1px solid var(--gray2);border-radius:var(--r);padding:11px 13px;margin:0 12px 8px;display:flex;align-items:center;gap:10px;cursor:pointer;}
.lcard:active{background:var(--gray0);}
.lnum{width:28px;height:28px;border-radius:50%;background:var(--blue-lt);color:var(--blue);font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.linfo{flex:1;}
.lname{font-size:13px;font-weight:700;}
.ldetail{font-size:11px;color:var(--gray5);margin-top:2px;line-height:1.5;}
.ldel{font-size:11px;color:var(--red);cursor:pointer;padding:4px 9px;border:1px solid var(--red-bd);border-radius:6px;flex-shrink:0;}
.empty{text-align:center;padding:48px 0;color:var(--gray5);font-size:13px;}
#analyze-panel{display:none;position:fixed;inset:0;background:#fff;z-index:2000;overflow-y:auto;}
#analyze-panel.open{display:block;}
.aph{position:sticky;top:0;background:#1a56db;padding:10px 14px;display:flex;align-items:center;gap:10px;z-index:10;}
.aph h2{font-size:15px;font-weight:700;color:#fff;flex:1;}
.apb{padding:14px;}
.density-card{border-radius:var(--rs);padding:11px 13px;margin-bottom:7px;display:flex;align-items:center;gap:10px;border:1.5px solid transparent;cursor:pointer;}
.dc-num{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0;}
.dc-info{flex:1;}
.dc-name{font-size:13px;font-weight:700;}
.dc-detail{font-size:11px;margin-top:2px;}
.dc-density{font-size:18px;font-weight:800;white-space:nowrap;}
.exp-btn{width:100%;padding:13px;margin-bottom:8px;border:none;border-radius:var(--rs);font-size:14px;font-weight:700;cursor:pointer;}
#cdlg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:6000;align-items:center;justify-content:center;padding:20px;}
#cdlg.open{display:flex;}
.cbox{background:#fff;border-radius:16px;padding:22px 20px;width:100%;max-width:320px;}
.cttl{font-size:15px;font-weight:700;margin-bottom:8px;}
.cmsg{font-size:13px;color:var(--gray5);margin-bottom:18px;line-height:1.6;white-space:pre-wrap;}
.cbtns{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.cc{padding:11px;background:var(--gray1);border:none;border-radius:var(--rs);font-size:13px;font-weight:600;cursor:pointer;}
.co{padding:11px;color:#fff;border:none;border-radius:var(--rs);font-size:13px;font-weight:700;cursor:pointer;}
.road-label{background:#1d4ed8;color:#fff;font-size:11px;font-weight:700;padding:2px 6px;border-radius:4px;white-space:nowrap;box-shadow:0 1px 4px rgba(0,0,0,.3);}
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <h1>무양공원 주차밀도 조사 v11</h1>
    <button class="hbtn" onclick="cycleMap()" id="map-btn">🛰 위성</button>
    <div id="gps-badge">GPS 연결중</div>
  </div>
  <div id="map">
    <div id="calib-banner">📍 지도를 탭해 사진 위치를 지정하세요 — 취소는 여기 탭</div>
  </div>
  <div id="status"><div id="sdot"></div><span id="stxt">✏️ 라인 버튼으로 도로 구간을 그으세요</span></div>
  <div id="toolbar">
    <button class="tb tb-draw" id="tb-draw" onclick="toggleDraw()">✏️ 라인</button>
    <button class="tb" id="tb-done" onclick="finishDraw()" style="display:none;background:#ede9fe;color:#7c3aed;border:2px solid #c4b5fd;font-weight:700;">✅ 완료</button>
    <button class="tb tb-calib" id="tb-calib" onclick="doCalib()">📍 보정</button>
    <button class="tb tb-list" onclick="openList()">📋 목록</button>
    <button class="tb tb-analyze" onclick="openAnalyze()">📊 분석</button>
    <button class="tb tb-save" onclick="openExport()">💾 저장</button>
  </div>
</div>

<!-- 라인 속성 팝업 -->
<div class="pop" id="pop-line">
  <div class="pbox">
    <div class="phandle"></div>
    <div class="ptitle">
      <span id="lp-title">라인 속성</span>
      <button class="pb-del" onclick="deleteCurrentRoad()">🗑 삭제</button>
    </div>
    <div style="background:var(--green-lt);border:1px solid var(--green-bd);border-radius:var(--rs);padding:9px 12px;font-size:12px;font-weight:600;color:#065f46;margin-bottom:12px;" id="lp-auto"></div>
    <div class="psec">도로 정보</div>
    <div class="pf" style="margin-bottom:8px;">
      <label>주차 후 잔여 도로폭 (m)</label>
      <input type="number" id="lp-remain" placeholder="예: 3.5" min="0" step="0.5" oninput="checkFT()">
    </div>
    <div class="ft-box" id="ft-box">🚒 소방차 통행 불가 (잔여폭 4m 미만)</div>
    <div class="psec">선 종류</div>
    <div class="tgrid">
      <div class="tbtn t-w"  id="lt-w"  onclick="selType('white')">— 흰색 실선<br><small style="font-weight:400;font-size:10px;">주정차 허용</small></div>
      <div class="tbtn t-y1" id="lt-y1" onclick="selType('yellow1')">— 황색 단선<br><small style="font-weight:400;font-size:10px;">주정차 금지</small></div>
      <div class="tbtn t-y2" id="lt-y2" onclick="selType('yellow2')">= 황색 복선<br><small style="font-weight:400;font-size:10px;">스쿨존</small></div>
      <div class="tbtn t-ob" id="lt-ob" onclick="selType('obstacle')">🚫 적치물<br><small style="font-weight:400;font-size:10px;">상점 점용</small></div>
    </div>
    <div class="psec">차량 대수</div>
    <div id="cnt-bars"></div>
    <button class="cnt-add" onclick="openAddCnt()">+ 카운터 추가</button>
    <div class="psec">현장 사진</div>
    <div id="photo-list"></div>
    <button style="width:100%;padding:11px;border-radius:var(--rs);border:1.5px solid var(--gray2);background:#fff;font-size:13px;font-weight:600;color:var(--gray7);cursor:pointer;margin-bottom:4px;" onclick="takePhoto()">📷 사진 촬영 (GPS 위치 자동 저장)</button>
    <div class="psec">메모</div>
    <div class="pf" style="margin-bottom:4px;"><input type="text" id="lp-memo" placeholder="특이사항"></div>
    <div class="pbtns">
      <button class="pb-c" onclick="cancelLineProp()">취소</button>
      <button class="pb-s" onclick="saveLineProp()">저장</button>
    </div>
  </div>
</div>

<!-- 커스텀 카운터 추가 팝업 -->
<div class="pop" id="pop-addcnt">
  <div class="pbox">
    <div class="phandle"></div>
    <div class="ptitle">카운터 추가</div>
    <div class="pf"><label>이름</label><input type="text" id="ac-name" placeholder="예: 오토바이"></div>
    <div class="pf"><label>이모지</label><input type="text" id="ac-icon" placeholder="예: 🛵"></div>
    <div class="pbtns">
      <button class="pb-c" onclick="closePop('pop-addcnt')">취소</button>
      <button class="pb-s" onclick="confirmAddCnt()">추가</button>
    </div>
  </div>
</div>

<!-- 내보내기 팝업 -->
<div class="pop" id="pop-export">
  <div class="pbox">
    <div class="phandle"></div>
    <div class="ptitle">데이터 저장</div>
    <div id="exp-summary" style="font-size:12px;color:var(--gray5);background:var(--gray0);border-radius:var(--rs);padding:10px;margin-bottom:14px;line-height:1.9;"></div>
    <button class="exp-btn" style="background:var(--green);color:#fff;" onclick="expCSV()">CSV 다운로드 (엑셀)</button>
    <button class="exp-btn" style="background:var(--blue);color:#fff;" onclick="expJSON()">JSON 다운로드 (AI 분석)</button>
    <button class="exp-btn" style="background:var(--gray1);color:var(--gray7);" onclick="expClip()">클립보드 복사</button>
    <button class="exp-btn" style="background:var(--gray1);color:var(--gray7);" onclick="closePop('pop-export')">닫기</button>
  </div>
</div>

<!-- 목록 패널 -->
<div id="list-panel">
  <div class="lph">
    <button class="pb-c" style="flex:none;padding:5px 12px;" onclick="closeList()">← 뒤로</button>
    <h2>라인 목록</h2>
  </div>
  <div style="padding:12px 0;" id="list-body"></div>
</div>

<!-- 분석 패널 -->
<div id="analyze-panel">
  <div class="aph">
    <button style="background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.3);color:#fff;border-radius:7px;padding:5px 12px;font-size:11px;font-weight:700;cursor:pointer;flex:none;" onclick="closeAnalyze()">← 뒤로</button>
    <h2>주차밀도 분석</h2>
  </div>
  <div class="apb" id="analyze-body"></div>
</div>

<!-- 확인 다이얼로그 -->
<div id="cdlg">
  <div class="cbox">
    <div class="cttl" id="c-title">확인</div>
    <div class="cmsg" id="c-msg"></div>
    <div class="cbtns">
      <button class="cc" onclick="cRes(false)">아니오</button>
      <button class="co" id="c-ok" onclick="cRes(true)">확인</button>
    </div>
  </div>
</div>

<script>
const LC={white:{color:'#9ca3af',weight:5,dash:'8,4',label:'흰색 실선'},yellow1:{color:'#ca8a04',weight:5,dash:'',label:'황색 단선'},yellow2:{color:'#b45309',weight:6,dash:'3,4',label:'황색 복선(스쿨존)'},obstacle:{color:'#dc2626',weight:6,dash:'',label:'적치물 구간'}};
const BASE_CNTS=[{key:'car',icon:'🚗',lbl:'일반차량'},{key:'obs',icon:'🚫',lbl:'적치물'},{key:'large',icon:'🚛',lbl:'대형차'},{key:'camp',icon:'🚐',lbl:'캠핑카'}];
const TODAY=new Date().toISOString().split('T')[0];
let roads=JSON.parse(localStorage.getItem('v11_roads')||'[]');
let customCnts=JSON.parse(localStorage.getItem('v11_cst')||'[]');
let mapLayers={};
let currentPos=null,rawPos=null,calibOffset=null;
let locMk=null,locCir=null;
let drawMode=false,drawPts=[],drawMks=[],drawLine=null,drawDblTmr=null;
let editId=null,lpType=null,lpCnts={},lpPhotos=[];
let calibPhotoId=null;

/* 지도 */
const map=L.map('map',{zoomControl:true,doubleClickZoom:false}).setView([35.2101,126.8404],17);
const TILES=[
  {lbl:'🛰 위성',url:'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',opt:{attribution:'© Esri',maxZoom:19}},
  {lbl:'🗺 일반',url:'https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',opt:{attribution:'© CARTO',subdomains:'abcd',maxZoom:19}},
];
let tIdx=0,tile=L.tileLayer(TILES[1].url,TILES[1].opt).addTo(map);
document.getElementById('map-btn').textContent=TILES[0].lbl;

function cycleMap(){
  map.removeLayer(tile);tIdx=(tIdx+1)%TILES.length;
  tile=L.tileLayer(TILES[tIdx].url,TILES[tIdx].opt).addTo(map);
  document.getElementById('map-btn').textContent=TILES[(tIdx+1)%TILES.length].lbl;
}

/* GPS */
(function(){
  if(!navigator.geolocation)return;
  navigator.geolocation.getCurrentPosition(p=>{map.setView([p.coords.latitude,p.coords.longitude],17);},()=>{},{enableHighAccuracy:true,timeout:8000});
  navigator.geolocation.watchPosition(p=>{
    rawPos=[p.coords.latitude,p.coords.longitude];
    currentPos=calibOffset?[rawPos[0]-calibOffset.lat,rawPos[1]-calibOffset.lng]:rawPos;
    const acc=Math.round(p.coords.accuracy);
    const b=document.getElementById('gps-badge');
    b.textContent=calibOffset?`GPS ±${acc}m ✓`:`GPS ±${acc}m`;
    b.className=calibOffset?'calib':acc<=15?'ok':'';
    updLoc(currentPos,acc);
  },()=>{document.getElementById('gps-badge').textContent='GPS 오류';},{enableHighAccuracy:true,maximumAge:5000});
})();

function updLoc(pos,acc){
  if(locCir)map.removeLayer(locCir);if(locMk)map.removeLayer(locMk);
  locCir=L.circle(pos,{radius:acc,color:'#3b82f6',fillColor:'#3b82f6',fillOpacity:.1,weight:1}).addTo(map);
  locMk=L.circleMarker(pos,{radius:9,color:'#fff',fillColor:'#1d4ed8',fillOpacity:1,weight:2.5}).addTo(map);
  locMk.bringToFront();
}

function doCalib(){
  if(!rawPos){alert('GPS 신호를 기다리는 중입니다.');return;}
  const pts=[];
  roads.forEach(r=>{
    if(r.points.length>0)pts.push({lat:r.points[0][0],lng:r.points[0][1]});
    if(r.points.length>1)pts.push({lat:r.points[r.points.length-1][0],lng:r.points[r.points.length-1][1]});
  });
  if(!pts.length){calibOffset={lat:0,lng:0};document.getElementById('tb-calib').classList.add('done');document.getElementById('tb-calib').textContent='✓ 보정됨';setSt('GPS 보정 완료','ok');return;}
  const near=pts.reduce((b,pt)=>{const d=haverDist(rawPos[0],rawPos[1],pt.lat,pt.lng);return d<b.d?{d,pt}:b;},{d:Infinity,pt:null});
  const dm=Math.round(near.d);
  confirm2('GPS 위치 보정',`가장 가까운 라인 끝점: ${dm}m 거리\n현재 위치를 이 점으로 보정할까요?`,'보정 적용','#059669').then(ok=>{
    if(!ok)return;
    calibOffset={lat:rawPos[0]-near.pt.lat,lng:rawPos[1]-near.pt.lng};
    document.getElementById('tb-calib').classList.add('done');
    document.getElementById('tb-calib').textContent=`✓ ${dm}m 보정`;
    setSt(`GPS 보정 완료 — 오차 ${dm}m 적용`,'ok');
  });
}

/* 라인 그리기 */
function toggleDraw(){
  if(drawMode){cancelDraw();return;}
  drawMode=true;drawPts=[];drawMks=[];drawLine=null;
  document.getElementById('tb-draw').classList.add('on');
  document.getElementById('tb-draw').textContent='✏️ 취소';
  document.getElementById('tb-done').style.display='';
  document.getElementById('sdot').className='draw';
  setSt('지도를 탭해 점을 찍고 — ✅ 완료 버튼으로 라인 확정');
}

function cancelDraw(){
  drawMode=false;drawPts=[];
  if(drawDblTmr!==null){clearTimeout(drawDblTmr);drawDblTmr=null;}
  drawMks.forEach(m=>map.removeLayer(m));drawMks=[];
  if(drawLine){map.removeLayer(drawLine);drawLine=null;}
  document.getElementById('tb-draw').classList.remove('on');
  document.getElementById('tb-draw').textContent='✏️ 라인';
  document.getElementById('tb-done').style.display='none';
  document.getElementById('sdot').className='';
  setSt('✏️ 라인 버튼으로 도로 구간을 그으세요');
}

/* 단일탭 — 점 추가 */
map.on('click',function(e){
  if(calibPhotoId!==null){applyPhotoCalib(e.latlng);return;}
  if(!drawMode)return;
  if(drawDblTmr!==null)return;
  drawDblTmr=setTimeout(()=>{drawDblTmr=null;addDrawPoint(e.latlng);},280);
});

/* 더블탭 — 라인 완료 */
map.on('dblclick',function(e){
  if(!drawMode)return;
  if(drawDblTmr!==null){clearTimeout(drawDblTmr);drawDblTmr=null;}
  finishDraw();
});

function addDrawPoint(latlng){
  const pt=[latlng.lat,latlng.lng];drawPts.push(pt);
  const mk=L.circleMarker(latlng,{radius:6,color:'#7c3aed',fillColor:'#fff',fillOpacity:1,weight:2}).addTo(map);
  drawMks.push(mk);
  if(drawPts.length>1){if(drawLine)map.removeLayer(drawLine);drawLine=L.polyline(drawPts,{color:'#7c3aed',weight:3,dashArray:'8,5',opacity:.8}).addTo(map);}
  setSt(`점 ${drawPts.length}개 — 더블탭으로 완료`);
}

function finishDraw(){
  if(drawPts.length<2){cancelDraw();return;}
  drawMks.forEach(m=>map.removeLayer(m));drawMks=[];
  if(drawLine){map.removeLayer(drawLine);drawLine=null;}
  drawMode=false;
  document.getElementById('tb-draw').classList.remove('on');
  document.getElementById('tb-draw').textContent='✏️ 라인';
  document.getElementById('tb-done').style.display='none';
  document.getElementById('sdot').className='';
  let totalLen=0;
  for(let i=1;i<drawPts.length;i++)totalLen+=haverDist(drawPts[i-1][0],drawPts[i-1][1],drawPts[i][0],drawPts[i][1]);
  totalLen=Math.round(totalLen);
  const num=roads.length+1;
  const road={id:Date.now(),num,points:[...drawPts],length:totalLen,lineType:null,widthRemain:null,firetruck:false,cnts:{},photos:[],memo:'',time:nowStr(),bearing:Math.round(calcBearing(drawPts[0],drawPts[drawPts.length-1]))};
  BASE_CNTS.forEach(c=>{road.cnts[c.key]=0;});
  customCnts.forEach(c=>{road.cnts[c.key]=0;});
  roads.push(road);addRoadToMap(road);saveData();
  setSt(`라인 ${num} 저장됨 (${fmtLen(totalLen)}) — 선을 탭해 속성 입력`,'ok');
  drawPts=[];
  openLineProp(road.id);
}

/* 지도에 라인 렌더 */
function addRoadToMap(road){
  const cfg=LC[road.lineType]||{color:'#7c3aed',weight:3,dash:'8,5'};
  const pl=L.polyline(road.points,{color:cfg.color,weight:cfg.weight,dashArray:cfg.dash||null,opacity:.9}).addTo(map);
  const mid=road.points[Math.floor(road.points.length/2)];
  const lm=L.marker(mid,{icon:L.divIcon({html:`<div class="road-label">${road.num}</div>`,className:'',iconAnchor:[10,8]}),interactive:false,zIndexOffset:100}).addTo(map);

  /* 탭 = 속성창 — 그리기/보정 모드면 무시 */
  let pressTimer=null;
  pl.on('mousedown touchstart',()=>{pressTimer=setTimeout(()=>{pressTimer=null;},600);});
  pl.on('mouseup touchend',e=>{
    if(pressTimer){clearTimeout(pressTimer);pressTimer=null;
      if(drawMode||calibPhotoId!==null)return;
      L.DomEvent.stop(e);openLineProp(road.id);
    }
  });
  pl.on('mouseleave touchcancel',()=>{if(pressTimer){clearTimeout(pressTimer);pressTimer=null;}});

  const photoMks={};
  (road.photos||[]).forEach(ph=>{photoMks[ph.id]=addPhotoMarker(ph);});
  mapLayers['road_'+road.id]={pl,lm,photoMks};
}

function refreshRoadLine(road){
  const layers=mapLayers['road_'+road.id];if(!layers)return;
  const cfg=LC[road.lineType]||{color:'#7c3aed',weight:3,dash:'8,5'};
  layers.pl.setStyle({color:cfg.color,weight:cfg.weight,dashArray:cfg.dash||null});
  const total=totalCars(road);
  const density=road.length>0?(total/road.length*10).toFixed(1):'-';
  layers.pl.bindTooltip(`라인 ${road.num} · ${fmtLen(road.length)} · ${total}대 · ${density}대/10m`,{direction:'top',sticky:true});
  /* 번호 라벨 위치 갱신 */
  const mid=road.points[Math.floor(road.points.length/2)];
  layers.lm.setLatLng(mid);
  layers.lm.setIcon(L.divIcon({html:`<div class="road-label">${road.num}</div>`,className:'',iconAnchor:[10,8]}));
}

function removeRoadFromMap(id){
  const l=mapLayers['road_'+id];if(!l)return;
  map.removeLayer(l.pl);map.removeLayer(l.lm);
  Object.values(l.photoMks||{}).forEach(m=>map.removeLayer(m));
  delete mapLayers['road_'+id];
}

function addPhotoMarker(ph){
  const icon=L.divIcon({html:`<div style="background:#1d4ed8;color:#fff;font-size:13px;width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.4);">📷</div>`,className:'',iconAnchor:[13,13]});
  const mk=L.marker([ph.lat,ph.lng],{icon}).addTo(map);
  mk.bindTooltip(`사진 · ${ph.time}${ph.calibrated?' (보정됨)':' (GPS)'}`,{direction:'top'});
  return mk;
}

/* 라인 속성 팝업 */
function openLineProp(id){
  const road=roads.find(r=>r.id===id);if(!road)return;
  editId=id;lpType=road.lineType;
  lpCnts={...road.cnts};
  lpPhotos=(road.photos||[]).map(p=>({...p}));
  document.getElementById('lp-title').textContent=`라인 ${road.num} 속성`;
  document.getElementById('lp-auto').textContent=`거리: ${fmtLen(road.length)}  |  방위: ${bearingToText(road.bearing)}  |  ${road.time}`;
  document.getElementById('lp-remain').value=road.widthRemain||'';
  document.getElementById('lp-memo').value=road.memo||'';
  const m2={white:'w',yellow1:'y1',yellow2:'y2',obstacle:'ob'};
  Object.keys(m2).forEach(k=>document.getElementById('lt-'+m2[k])?.classList.toggle('sel',k===lpType));
  checkFT();renderCntBars();renderPhotoList();
  openPop('pop-line');
}

function cancelLineProp(){closePop('pop-line');editId=null;lpType=null;lpCnts={};lpPhotos=[];}

function saveLineProp(){
  const road=roads.find(r=>r.id===editId);if(!road){closePop('pop-line');return;}
  road.lineType=lpType;
  road.widthRemain=parseFloat(document.getElementById('lp-remain').value)||null;
  road.firetruck=road.widthRemain!==null&&road.widthRemain<4;
  road.cnts={...lpCnts};
  road.photos=lpPhotos.map(p=>({...p}));
  road.memo=document.getElementById('lp-memo').value.trim();
  const layers=mapLayers['road_'+road.id];
  if(layers){Object.values(layers.photoMks||{}).forEach(m=>map.removeLayer(m));layers.photoMks={};road.photos.forEach(ph=>{layers.photoMks[ph.id]=addPhotoMarker(ph);});}
  refreshRoadLine(road);saveData();closePop('pop-line');
  setSt(`라인 ${road.num} 저장됨`,'ok');
  editId=null;lpType=null;lpCnts={};lpPhotos=[];
}

function deleteCurrentRoad(){
  if(!editId)return;
  const road=roads.find(r=>r.id===editId);
  confirm2('라인 삭제',`라인 ${road?.num}을 삭제할까요?`,'삭제','#dc2626').then(ok=>{
    if(!ok)return;
    removeRoadFromMap(editId);
    roads=roads.filter(r=>r.id!==editId);
    roads.forEach((r,i)=>{r.num=i+1;refreshRoadLine(r);});
    saveData();closePop('pop-line');setSt('라인 삭제됨');editId=null;
  });
}

function selType(t){
  lpType=t;
  const m={white:'w',yellow1:'y1',yellow2:'y2',obstacle:'ob'};
  Object.keys(m).forEach(k=>document.getElementById('lt-'+m[k])?.classList.toggle('sel',k===t));
}

function checkFT(){
  const v=parseFloat(document.getElementById('lp-remain').value);
  document.getElementById('ft-box').classList.toggle('show',!isNaN(v)&&v<4);
}

/* 카운터 바 */
function renderCntBars(){
  const allCnts=[...BASE_CNTS,...customCnts];
  allCnts.forEach(c=>{if(lpCnts[c.key]===undefined)lpCnts[c.key]=0;});
  const el=document.getElementById('cnt-bars');el.innerHTML='';
  allCnts.forEach(c=>{
    const isCustom=!BASE_CNTS.find(b=>b.key===c.key);
    const bar=document.createElement('div');bar.className='cnt-bar';
    bar.innerHTML=`
      <button class="cnt-minus" onclick="adjCnt('${c.key}',-1)">−</button>
      <div class="cnt-mid">
        ${isCustom?`<div class="cnt-x" onclick="removeCustomCnt('${c.key}')">×</div>`:''}
        <span class="cnt-lbl">${c.icon} ${c.lbl}</span>
        <span class="cnt-val" id="cv-${c.key}">${lpCnts[c.key]||0}</span>
      </div>
      <button class="cnt-plus" onclick="adjCnt('${c.key}',1)">+</button>`;
    el.appendChild(bar);
  });
}

function adjCnt(key,delta){
  lpCnts[key]=Math.max(0,(lpCnts[key]||0)+delta);
  const el=document.getElementById('cv-'+key);if(el)el.textContent=lpCnts[key];
}

function openAddCnt(){document.getElementById('ac-name').value='';document.getElementById('ac-icon').value='';openPop('pop-addcnt');}

function confirmAddCnt(){
  const name=document.getElementById('ac-name').value.trim();if(!name){alert('이름을 입력하세요.');return;}
  const icon=document.getElementById('ac-icon').value.trim()||'📌';
  const key='c_'+Date.now();
  customCnts.push({key,icon,lbl:name});lpCnts[key]=0;
  localStorage.setItem('v11_cst',JSON.stringify(customCnts));
  closePop('pop-addcnt');renderCntBars();
}

function removeCustomCnt(key){
  confirm2('카운터 삭제','이 카운터를 삭제할까요?','삭제','#dc2626').then(ok=>{
    if(!ok)return;
    customCnts=customCnts.filter(c=>c.key!==key);delete lpCnts[key];
    localStorage.setItem('v11_cst',JSON.stringify(customCnts));renderCntBars();
  });
}

/* 사진 */
function takePhoto(){
  const input=document.createElement('input');input.type='file';input.accept='image/*';input.capture='environment';
  input.onchange=e=>{
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      const acc=parseInt(document.getElementById('gps-badge').textContent.match(/±(\d+)m/)?.[1]||'99');
      const ph={id:'ph_'+Date.now(),dataUrl:ev.target.result,lat:currentPos?currentPos[0]:35.2101,lng:currentPos?currentPos[1]:126.8404,time:nowStr(),calibrated:false,accuracy:acc};
      lpPhotos.push(ph);renderPhotoList();
    };
    reader.readAsDataURL(file);
  };
  input.click();
}

function renderPhotoList(){
  const el=document.getElementById('photo-list');el.innerHTML='';
  lpPhotos.forEach(ph=>{
    const isWarn=!ph.calibrated&&ph.accuracy>10;
    const card=document.createElement('div');card.className='photo-card';
    card.innerHTML=`
      <div class="photo-card-top">
        <div class="photo-thumb">${ph.dataUrl?`<img src="${ph.dataUrl}" alt="">`:'📷'}</div>
        <div class="photo-info">
          <div class="photo-name">${ph.time}</div>
          <span class="photo-badge ${ph.calibrated?'badge-ok':'badge-gps'}">${ph.calibrated?'위치 보정됨':`GPS ±${ph.accuracy}m`}</span>
          <div class="photo-coord">${ph.lat.toFixed(5)}, ${ph.lng.toFixed(5)}</div>
        </div>
        <button class="photo-del" onclick="deletePhoto('${ph.id}')">×</button>
      </div>
      <div class="photo-footer ${isWarn?'warn':ph.calibrated?'ok':''}">
        <span class="photo-hint ${isWarn?'warn':ph.calibrated?'ok':''}">${ph.calibrated?'S펜으로 위치 직접 지정됨':isWarn?'마커 위치가 부정확할 수 있어요':'GPS 위치 자동 저장됨'}</span>
        <button class="photo-calib-btn ${isWarn?'warn':'ok'}" onclick="startPhotoCalib('${ph.id}')">${ph.calibrated?'재보정':'S펜 위치 보정'}</button>
      </div>`;
    el.appendChild(card);
  });
}

function deletePhoto(phId){lpPhotos=lpPhotos.filter(p=>p.id!==phId);renderPhotoList();}

function startPhotoCalib(phId){
  calibPhotoId=phId;closePop('pop-line');
  document.getElementById('calib-banner').classList.add('show');
  setSt('지도를 탭해 사진의 정확한 위치를 찍으세요','calib');
  document.getElementById('calib-banner').onclick=cancelPhotoCalib;
}

function applyPhotoCalib(latlng){
  const ph=lpPhotos.find(p=>p.id===calibPhotoId);
  if(ph){ph.lat=latlng.lat;ph.lng=latlng.lng;ph.calibrated=true;}
  document.getElementById('calib-banner').classList.remove('show');
  calibPhotoId=null;setSt('위치 보정 완료','ok');
  if(editId)openLineProp(editId);
}

function cancelPhotoCalib(){
  document.getElementById('calib-banner').classList.remove('show');
  calibPhotoId=null;setSt('보정 취소됨');
  if(editId)openLineProp(editId);
}

/* 목록 */
function openList(){
  let html='';
  if(!roads.length)html='<div class="empty">저장된 라인이 없습니다.</div>';
  else roads.forEach(r=>{
    const total=totalCars(r);
    const density=r.length>0?(total/r.length*10).toFixed(1):'-';
    html+=`<div class="lcard" onclick="closeList();openLineProp(${r.id})">
      <div class="lnum">${r.num}</div>
      <div class="linfo">
        <div class="lname">${r.firetruck?'🚒 ':''}라인 ${r.num} · ${fmtLen(r.length)}</div>
        <div class="ldetail">${LC[r.lineType]?.label||'선종류 미입력'} · ${total}대 · ${density}대/10m${r.widthRemain?' · 잔여'+r.widthRemain+'m':''}</div>
      </div>
      <span class="ldel" onclick="event.stopPropagation();confirmDelRoad(${r.id})">삭제</span>
    </div>`;
  });
  document.getElementById('list-body').innerHTML=html;
  document.getElementById('list-panel').classList.add('open');
}
function closeList(){document.getElementById('list-panel').classList.remove('open');}

function confirmDelRoad(id){
  const r=roads.find(r=>r.id===id);
  confirm2('라인 삭제',`라인 ${r?.num}을 삭제할까요?`,'삭제','#dc2626').then(ok=>{
    if(!ok)return;
    removeRoadFromMap(id);roads=roads.filter(r=>r.id!==id);
    roads.forEach((r,i)=>{r.num=i+1;refreshRoadLine(r);});
    saveData();openList();
  });
}

/* 분석 */
function openAnalyze(){renderAnalyze();document.getElementById('analyze-panel').classList.add('open');}
function closeAnalyze(){document.getElementById('analyze-panel').classList.remove('open');}

function densityColor(ratio){
  if(ratio>=.75)return{bg:'#fef2f2',border:'#fca5a5',txt:'#991b1b',dot:'#dc2626',label:'매우 높음'};
  if(ratio>=.5) return{bg:'#fef3c7',border:'#fcd34d',txt:'#92400e',dot:'#d97706',label:'높음'};
  if(ratio>=.25)return{bg:'#fefce8',border:'#fef08a',txt:'#713f12',dot:'#ca8a04',label:'보통'};
  return             {bg:'#d1fae5',border:'#6ee7b7',txt:'#065f46',dot:'#059669',label:'낮음'};
}

function renderAnalyze(){
  if(!roads.length){document.getElementById('analyze-body').innerHTML='<div class="empty">라인 데이터가 없습니다.</div>';return;}
  const items=roads.map(r=>({road:r,total:totalCars(r),density:r.length>0?totalCars(r)/r.length*10:0}));
  items.sort((a,b)=>b.density-a.density);
  const maxD=items[0].density||1;
  const totalAll=items.reduce((s,d)=>s+d.total,0);
  const avgD=items.reduce((s,d)=>s+d.density,0)/items.length;

  /* 지도 라인 색 업데이트 */
  items.forEach(({road,density})=>{
    const c=densityColor(density/maxD);
    const l=mapLayers['road_'+road.id];
    if(l)l.pl.setStyle({color:c.dot,weight:6,dashArray:null});
  });

  let html=`
  <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px;">
    <div style="background:var(--gray0);border-radius:var(--rs);padding:12px;text-align:center;"><div style="font-size:10px;color:var(--gray5);margin-bottom:4px;">총 라인</div><div style="font-size:22px;font-weight:800;">${roads.length}</div></div>
    <div style="background:var(--gray0);border-radius:var(--rs);padding:12px;text-align:center;"><div style="font-size:10px;color:var(--gray5);margin-bottom:4px;">총 차량</div><div style="font-size:22px;font-weight:800;">${totalAll}대</div></div>
    <div style="background:var(--gray0);border-radius:var(--rs);padding:12px;text-align:center;"><div style="font-size:10px;color:var(--gray5);margin-bottom:4px;">평균 밀도</div><div style="font-size:22px;font-weight:800;">${avgD.toFixed(1)}</div><div style="font-size:9px;color:var(--gray5);">대/10m</div></div>
  </div>
  <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;">
    ${[{l:'낮음',c:'#059669'},{l:'보통',c:'#ca8a04'},{l:'높음',c:'#d97706'},{l:'매우 높음',c:'#dc2626'}].map(x=>`<div style="display:flex;align-items:center;gap:4px;font-size:11px;color:var(--gray7);"><div style="width:11px;height:11px;border-radius:50%;background:${x.c};"></div>${x.l}</div>`).join('')}
  </div>
  <div style="font-size:10px;color:var(--gray5);margin-bottom:10px;">지도의 라인 색이 밀도에 따라 업데이트됩니다</div>
  <div style="font-size:11px;font-weight:700;color:var(--gray5);letter-spacing:.05em;margin-bottom:8px;">밀도 순위 (높은 순)</div>`;

  items.forEach(({road,total,density})=>{
    const c=densityColor(density/maxD);
    html+=`<div class="density-card" style="background:${c.bg};border-color:${c.border};" onclick="closeAnalyze();openLineProp(${road.id})">
      <div class="dc-num" style="background:${c.dot};">${road.num}</div>
      <div class="dc-info">
        <div class="dc-name" style="color:${c.txt};">라인 ${road.num} · ${fmtLen(road.length)}${road.firetruck?' 🚒':''}</div>
        <div class="dc-detail" style="color:${c.txt};opacity:.8;">${LC[road.lineType]?.label||'선종류 미입력'}${road.widthRemain?' · 잔여'+road.widthRemain+'m':''}</div>
      </div>
      <div class="dc-density" style="color:${c.dot};">${density.toFixed(1)}<span style="font-size:10px;font-weight:500;">대/10m</span></div>
    </div>`;
  });

  const ftRoads=roads.filter(r=>r.firetruck);
  if(ftRoads.length)html+=`<div style="background:#fef2f2;border:2px solid #fca5a5;border-radius:var(--r);padding:14px;margin-top:12px;text-align:center;"><div style="font-size:32px;font-weight:800;color:#dc2626;">${ftRoads.length}</div><div style="font-size:12px;font-weight:700;color:#991b1b;">개 구간 소방차 통행 불가</div><div style="font-size:11px;color:#b91c1c;margin-top:4px;">라인 ${ftRoads.map(r=>r.num).join(', ')}</div></div>`;
  document.getElementById('analyze-body').innerHTML=html;
}

/* 내보내기 */
function openExport(){
  const total=roads.reduce((s,r)=>s+totalCars(r),0);
  const tLen=roads.reduce((s,r)=>s+r.length,0);
  document.getElementById('exp-summary').innerHTML=`조사일: ${TODAY}<br>라인: ${roads.length}개 · 총 거리: ${fmtLen(tLen)}<br>총 차량: ${total}대<br>소방차 불가: ${roads.filter(r=>r.firetruck).length}개 구간`;
  openPop('pop-export');
}

function buildData(){
  return{title:'무양공원 주차밀도 현장조사',surveyDate:TODAY,summary:{roads:roads.length,totalCars:roads.reduce((s,r)=>s+totalCars(r),0),totalLength:fmtLen(roads.reduce((s,r)=>s+r.length,0)),firetruckBlocked:roads.filter(r=>r.firetruck).length},roads:roads.map(r=>({num:r.num,length:fmtLen(r.length),lineType:LC[r.lineType]?.label||r.lineType||'미입력',widthRemain:r.widthRemain,firetruck:r.firetruck,cnts:r.cnts,totalCars:totalCars(r),density_per10m:r.length>0?+(totalCars(r)/r.length*10).toFixed(2):0,memo:r.memo,time:r.time,photos:(r.photos||[]).map(p=>({time:p.time,lat:p.lat,lng:p.lng,calibrated:p.calibrated}))}))};
}

function expCSV(){
  const allKeys=[...BASE_CNTS,...customCnts].map(c=>c.key);
  const header=['라인번호','거리(m)','선종류','잔여폭(m)','소방차통행',...allKeys.map(k=>[...BASE_CNTS,...customCnts].find(c=>c.key===k)?.lbl||k),'총차량','밀도(대/10m)','메모','시각'];
  const rows=roads.map(r=>[r.num,r.length,LC[r.lineType]?.label||r.lineType||'',r.widthRemain||'',r.firetruck?'불가':'',...allKeys.map(k=>r.cnts?.[k]||0),totalCars(r),r.length>0?(totalCars(r)/r.length*10).toFixed(2):0,r.memo||'',r.time||''].map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(','));
  dl('\uFEFF'+[header.join(','),...rows].join('\n'),`무양공원_${TODAY}.csv`,'text/csv');
  closePop('pop-export');
}
function expJSON(){dl(JSON.stringify(buildData(),null,2),`무양공원_${TODAY}.json`,'application/json');closePop('pop-export');}
function expClip(){navigator.clipboard.writeText(JSON.stringify(buildData(),null,2)).then(()=>{alert('복사됨!');closePop('pop-export');});}
function dl(c,f,t){const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([c],{type:t}));a.download=f;a.click();}

/* 유틸 */
function totalCars(road){if(!road.cnts)return 0;return Object.values(road.cnts).reduce((s,v)=>s+(parseInt(v)||0),0);}
function calcBearing(s,e){const la1=s[0]*Math.PI/180,la2=e[0]*Math.PI/180,dL=(e[1]-s[1])*Math.PI/180,y=Math.sin(dL)*Math.cos(la2),x=Math.cos(la1)*Math.sin(la2)-Math.sin(la1)*Math.cos(la2)*Math.cos(dL);return(Math.atan2(y,x)*180/Math.PI+360)%360;}
function bearingToText(b){return['북','북동','동','남동','남','남서','서','북서'][Math.round(b/45)%8];}
function haverDist(a,b,c,d){const R=6371000,dL=(c-a)*Math.PI/180,dG=(d-b)*Math.PI/180,x=Math.sin(dL/2)**2+Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(dG/2)**2;return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));}
function fmtLen(m){return m>=1000?`${(m/1000).toFixed(2)}km`:`${m}m`;}
function nowStr(){return new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'});}
function setSt(txt,cls=''){document.getElementById('stxt').textContent=txt;document.getElementById('sdot').className=cls;}
function openPop(id){document.getElementById(id).classList.add('open');}
function closePop(id){document.getElementById(id).classList.remove('open');}

let _cRes=null;
function confirm2(title,msg,okLbl='확인',okCol='#dc2626'){
  document.getElementById('c-title').textContent=title;document.getElementById('c-msg').textContent=msg;
  document.getElementById('c-ok').textContent=okLbl;document.getElementById('c-ok').style.background=okCol;
  document.getElementById('cdlg').classList.add('open');return new Promise(r=>{_cRes=r;});
}
function cRes(v){document.getElementById('cdlg').classList.remove('open');if(_cRes){_cRes(v);_cRes=null;}}

/* 저장/복원 */
function saveData(){
  const toSave=roads.map(r=>({...r,photos:(r.photos||[]).map(p=>({...p,dataUrl:undefined}))}));
  localStorage.setItem('v11_roads',JSON.stringify(toSave));
  const photoData={};roads.forEach(r=>{(r.photos||[]).forEach(p=>{if(p.dataUrl)photoData[p.id]=p.dataUrl;});});
  try{localStorage.setItem('v11_photos',JSON.stringify(photoData));}catch(e){}
}

(function restore(){
  const photoData=JSON.parse(localStorage.getItem('v11_photos')||'{}');
  roads.forEach((r,i)=>{r.num=i+1;r.photos=(r.photos||[]).map(p=>({...p,dataUrl:photoData[p.id]||null}));});
  roads.forEach(r=>addRoadToMap(r));
  roads.forEach(r=>refreshRoadLine(r));
})();
</script>
